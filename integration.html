<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>উচ্চতর গণিত: যোগজীকরণ MCQ</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anek+Bangla:wght@400;500;600;700&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet" />

  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
      }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

  <link rel="stylesheet" href="assets/quiz-style.css" />
</head>
<body>
  <main class="shell">
    <section class="card">
      <header class="hero">
        <h1>উচ্চতর গণিত ১ম পত্র: যোগজীকরণ</h1>
        <p>PDF থেকে নেওয়া প্রশ্ন ও উত্তর | ২৫টি MCQ | ২৫ মিনিট</p>
        <p style="margin-top:10px;">
          <a href="index.html" style="display:inline-block; text-decoration:none; color:#ffffff; border:1px solid rgba(255,255,255,0.7); border-radius:10px; padding:6px 12px; font-weight:600;">Home</a>
        </p>
      </header>

      <div id="start-screen" class="content">
        <div class="panel">
          <h2 style="margin:0 0 8px; font-size:1.2rem;">Model Test শুরু করুন</h2>
          <p class="muted" style="margin:0 0 12px;">মোবাইল-ফ্রেন্ডলি টেস্ট ইন্টারফেস, সাবমিটের পর সাথে সাথে সঠিক-ভুল উত্তর দেখাবে।</p>
          <button class="btn" type="button" onclick="window.quizApp.startQuiz()">Start Quiz</button>
        </div>
      </div>

      <div id="status-bar" class="content status-bar hidden">
        <div class="timer">সময়: <span id="time">25:00</span></div>
        <div class="progress"><span id="progress-fill"></span></div>
      </div>

      <div id="quiz-screen" class="content hidden">
        <form id="quiz-form">
          <div id="questions-container"></div>
          <div class="submit-wrap">
            <button class="btn secondary" type="button" onclick="window.quizApp.submitQuiz(false)">Submit Quiz</button>
          </div>
        </form>
      </div>

      <div id="result-screen" class="content hidden">
        <div class="result-box">
          <div class="score">স্কোর: <span id="score">0</span> / 25</div>
          <p id="result-message" class="muted" style="margin:8px 0 0;"></p>
        </div>
        <div id="review-container"></div>
        <div class="result-action">
          <button class="btn" type="button" onclick="location.reload()">আবার দাও</button>
        </div>
      </div>
    </section>
  </main>

  <script src="assets/quiz-engine.js"></script>
  <script>
    const integrationQuestions = [
      { q: "$\\int_{1}^{e}\\frac{dx}{x(1+\\ln x)}$ এর মান কত?", opts: ["e", "e+1", "\\ln(e-1)", "\\ln 2"], ans: 3 },
      { q: "$\\int_{0}^{1}\\frac{e^{\\sqrt{x}}}{\\sqrt{x}}dx$ এর মান কোনটি?", opts: ["$2e^{-1}$", "$2(e-1)$", "$\\frac{2}{e}-1$", "$1-\\frac{1}{e}$"], ans: 1 },
      { q: "$-\\int_{2}^{1}\\ln x \\, dx$ এর মান কোনটি?", opts: ["$2\\ln 2-1$", "$2\\ln 2+1$", "$2\\ln 2$", "$\\ln 2$"], ans: 0 },
      { q: "$\\int_{0}^{\\frac{\\pi}{4}}\\sec\\theta \\, d\\theta = ?$", opts: ["$\\frac{1}{2}\\ln 2$", "$\\frac{1}{2}\\ln(\\sqrt{2}+1)$", "$\\ln(\\sqrt{2}+1)$", "$\\ln(\\sqrt{2}-1)$"], ans: 2 },
      { q: "$\\int_{0}^{\\frac{\\pi}{4}}\\frac{dx}{1+\\cos 2x}$ এর মান কোনটি?", opts: ["1/2", "$\\frac{\\sqrt{3}}{2}$", "1", "2"], ans: 0 },
      { q: "$\\int\\frac{x}{\\sqrt{1-x^{2}}}dx = ?$", opts: ["$\\frac{x^{2}}{2}+c$", "$-\\sqrt{1-x^{2}}+c$", "$\\sqrt{1-x^{2}}+c$", "$\\sqrt{1+x}+c$"], ans: 1 },
      { q: "$\\int e^{x}\\left(\\frac{1}{x}+\\ln x\\right)dx = ?$", opts: ["$e^{x}\\ln x+c$", "$e^{x}+\\ln x+c$", "$e^{x}\\cdot\\frac{1}{x}+c$", "$e^{x}+\\frac{1}{x}+c$"], ans: 0 },
      { q: "$\\int\\frac{\\cot x}{\\sqrt{\\sin x}}dx = ?$", opts: ["$\\frac{-2}{\\sqrt{\\sin x}}+c$", "$\\frac{-1}{2\\sqrt{\\sin x}}+c$", "$\\frac{1}{2\\sqrt{\\sin x}}+c$", "$2\\sqrt{\\sin x}+c$"], ans: 0 },
      { q: "$\\int e^{x}\\cos x(1+\\tan x)dx$ এর মান কত?", opts: ["$e^{x}\\cos x+c$", "$e^{x}\\tan x+c$", "$e^{x}\\sec x+c$", "$e^{x}\\sin x+c$"], ans: 3 },
      { q: "$\\int 10^{5x}dx = ?$", opts: ["$\\frac{10^{5x}}{\\ln 10}+c$", "$\\frac{10^{5x}}{5\\ln 10}+c$", "$5\\cdot 10^{5x}\\ln 10+c$", "$10^{5x}\\ln 10+c$"], ans: 1 },
      { q: "$\\int x^{-9}dx = ?$", opts: ["$-9x^{-8}+c$", "$-9x^{-10}+c$", "$-\\frac{1}{10}x^{-10}+c$", "$-\\frac{x^{-8}}{8}+c$"], ans: 3 },
      { q: "$\\int\\frac{1}{\\sqrt{18-2x^{2}}}dx = ?$", opts: ["$\\frac{1}{\\sqrt{2}}\\sin^{-1}\\frac{x}{3}+c$", "$\\frac{1}{3\\sqrt{2}}\\tan^{-1}\\frac{x}{3}+c$", "$\\frac{1}{6\\sqrt{2}}\\ln\\left|\\frac{3+x}{3-x}\\right|+c$", "$\\frac{1}{6\\sqrt{2}}\\ln\\left|\\frac{x-3}{x+3}\\right|+c$"], ans: 0 },
      { q: "$\\int_{0}^{1}\\frac{e^{5x}+e^{3x}}{e^{x}+e^{-x}}dx = ?$", opts: ["$4(e^{4}-1)$", "$\\frac{1}{5}(e^{5}-1)$", "$5(e^{5}-1)$", "$\\frac{1}{4}(e^{4}-1)$"], ans: 3 },
      { q: "$\\int_{0}^{\\frac{\\pi}{2}}\\sin^{8}\\theta\\cos\\theta \\, d\\theta$ এর মান-", opts: ["1/9", "1/8", "1/7", "1/6"], ans: 0 },
      { q: "$\\int\\frac{1}{3\\sqrt{x}}dx = ?$", opts: ["$-\\frac{2}{3}\\sqrt{x}+c$", "$\\frac{3}{2}\\sqrt{x}+c$", "$\\frac{2}{3}\\sqrt{x}+c$", "$\\frac{2}{\\sqrt{3}}\\sqrt{x}+c$"], ans: 2 },
      { q: "$\\int_{1}^{\\sqrt{3}}\\frac{dx}{1+x^{2}} = ?$", opts: ["$\\frac{\\pi}{24}$", "$\\frac{\\pi}{12}$", "$\\frac{\\pi}{4}$", "$\\frac{\\pi}{3}$"], ans: 1 },
      { q: "$\\int_{0}^{1}\\frac{\\ln(x+1)}{x+1}dx = ?$", opts: ["$2\\ln 2$", "$\\frac{1}{2}\\ln 2$", "$2(\\ln 2)^{2}$", "$\\frac{1}{2}(\\ln 2)^{2}$"], ans: 3 },
      { q: "$\\int\\frac{5}{1-5x}dx = ?$", opts: ["$\\ln(1-5x)+c$", "$-\\ln(1-5x)+c$", "$\\frac{\\ln(1-5x)}{5}$", "$\\frac{-\\ln(1-5x)}{5}$"], ans: 1 },
      { q: "$\\int\\frac{\\cos x}{\\sqrt{\\sin x}}dx = ?$", opts: ["$2\\sqrt{\\cos x}+c$", "$2\\sqrt{\\sin x}+c$", "$\\frac{1}{2}\\sqrt{\\cos x}+c$", "$\\frac{1}{2}\\sqrt{\\sin x}+c$"], ans: 1 },
      { q: "$x^{2}+y^{2}=1$ বৃত্ত দ্বারা আবদ্ধ ক্ষেত্রের ক্ষেত্রফল-", opts: ["$\\frac{\\pi}{3}$", "$\\frac{\\pi}{2}$", "$\\pi$", "$2\\pi$"], ans: 2 },
      { q: "$\\int \\sin\\left(10-\\frac{x}{5}\\right)dx = ?$", opts: ["$5\\cos\\left(10-\\frac{x}{5}\\right)+c$", "$-5\\cos\\left(10-\\frac{x}{5}\\right)+c$", "$-\\frac{1}{5}\\cos\\left(10-\\frac{x}{5}\\right)+c$", "$\\frac{1}{5}\\cos\\left(10-\\frac{x}{5}\\right)+c$"], ans: 0 },
      { q: "$\\int_{0}^{1}e^{-2x}dx = ?$", opts: ["$2(1-e^{-2})$", "$2(e^{-2}-1)$", "$\\frac{1}{2}(e^{-2}-1)$", "$\\frac{1}{2}(1-e^{-2})$"], ans: 3 },
      { q: "$\\frac{x^{2}}{16}+\\frac{y^{2}}{25}=1$ উপবৃত্তটির ক্ষেত্রফল কত বর্গ একক?", opts: ["$16\\pi$", "$20\\pi$", "$25\\pi$", "$400\\pi$"], ans: 1 },
      { q: "$\\int\\frac{1}{\\cos^{2}p\\sqrt{\\tan p}}dp = ?$", opts: ["$\\sqrt{\\tan p}+c$", "$\\sqrt{\\cot p}+c$", "$2\\sqrt{\\tan p}+c$", "$2\\sqrt{\\cot p}+c$"], ans: 2 },
      { q: "$\\int_{0}^{1}\\frac{\\sin^{-1}p}{\\sqrt{1-p^{2}}}dp = ?$", opts: ["$\\frac{\\pi}{2}$", "$\\frac{\\pi^{2}}{2}$", "$\\frac{\\pi^{2}}{4}$", "$\\frac{\\pi^{2}}{8}$"], ans: 3 }
    ];

    window.quizApp = createQuizApp({
      questions: integrationQuestions,
      timeMinutes: 25
    });
  </script>
</body>
</html>
